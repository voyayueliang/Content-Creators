<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Moon Gate Avatar Mark</title>
  <desc id="desc">A moon gate mark with lunar orbit, tidal line and phase dots.</desc>
  <defs>
    <linearGradient id="gate" x1="44" y1="28" x2="172" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#AFF3AD"/>
      <stop offset=".48" stop-color="#84EE80"/>
      <stop offset="1" stop-color="#5B845A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="220" height="220" rx="44" fill="#0D0B0C"/>
  <g transform="translate(20 18)">
    <ellipse cx="96" cy="96" rx="82" ry="50" fill="none" stroke="#2A3B29" stroke-width="4" transform="rotate(-15 96 96)"/>
    <ellipse cx="96" cy="96" rx="64" ry="34" fill="none" stroke="#84EE80" stroke-width="3" stroke-dasharray="46 18" stroke-linecap="round" transform="rotate(-15 96 96)"/>
    <path d="M48 143 L48 83 C48 49 69 28 97 28 C125 28 146 49 146 83 L146 143" fill="none" stroke="url(#gate)" stroke-width="12" stroke-linecap="round"/>
    <circle cx="97" cy="89" r="47" fill="#84EE80" filter="url(#softGlow)"/>
    <circle cx="116" cy="74" r="51" fill="#0D0B0C"/>
    <path d="M50 144 C75 129 99 153 126 137 C140 129 153 132 170 118" fill="none" stroke="#F4F1E8" stroke-width="4" stroke-linecap="round"/>
    <g fill="#AFF3AD">
      <circle cx="39" cy="95" r="5"/>
      <circle cx="72" cy="39" r="4.5"/>
      <circle cx="158" cy="77" r="5"/>
      <circle cx="128" cy="155" r="4.5"/>
    </g>
  </g>
</svg>
